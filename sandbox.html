<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Prevents native browser zoom, handling it all in our app -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta-Mind | v14.3 Mobile Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="meta-mind-ui.css">

    <!-- CRITICAL LOAD ORDER -->
    <script src="meta-mind-rules.js"></script>
    <script src="meta-mind-core.js"></script>
    <script src="phase-engines.js"></script>
    <script src="meta-mind-sandbox.js"></script>
</head>

<body class="overflow-hidden bg-slate-950 select-none">
    <nav
        class="h-14 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center px-2 md:px-4 z-50 relative backdrop-blur w-full">
        <!-- Identity & Status -->
        <div class="flex items-center gap-2 shrink-0">
            <!-- Mobile Hamburger Menu -->
            <button id="btn-sidebar-toggle"
                class="md:hidden p-1.5 text-slate-400 hover:text-white transition-colors rounded hover:bg-slate-800"
                onclick="SC.toggleSidebar()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>

            <div
                class="w-8 h-8 bg-sky-600 rounded items-center justify-center text-white font-black shadow-lg shadow-sky-900/50 hidden sm:flex">
                M</div>
            <div class="flex flex-col ml-1">
                <span id="map-title" class="text-sm font-bold text-slate-200 leading-none">Meta-Mind v14.3</span>
                <div class="flex gap-2 mt-1">
                    <span id="save-status"
                        class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Local
                    </span>
                    <span id="host-status"
                        class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center gap-1 hidden sm:flex">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Host Offline
                    </span>
                </div>
            </div>
        </div>

        <!-- Responsive Toolbar -->
        <div class="flex gap-2 overflow-x-auto no-scrollbar items-center px-2">
            <div class="h-6 w-px bg-slate-700 mx-1 shrink-0 hidden md:block"></div>
            <button id="btn-add"
                class="shrink-0 px-3 py-1.5 bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold rounded transition-colors shadow-lg shadow-sky-900/20">+
                Root</button>
            <button id="btn-arrange"
                class="shrink-0 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded border border-slate-700 transition-colors"
                title="Force-Directed Organic Layout">Arrange</button>
            <button id="btn-undo"
                class="shrink-0 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded border border-slate-700 transition-colors hidden sm:block">Undo</button>
            <div class="h-6 w-px bg-slate-700 mx-1 shrink-0"></div>
            <button id="btn-focal" class="shrink-0 transition-all cursor-pointer" title="Toggle Camera Tracking">👁️
                Auto-Focus</button>
            <div class="h-6 w-px bg-slate-700 mx-1 shrink-0 hidden md:block"></div>
        </div>
    </nav>

    <div id="stage">
        <!-- Left Sidebar (Responsive Overlay on Mobile) -->
        <div class="w-80 max-w-[85vw] border-r border-slate-800 flex flex-col z-40 bg-slate-900/95 md:bg-slate-900/80 backdrop-blur-md shrink-0"
            id="sidebar">
            <div class="sidebar-tabs">
                <div class="sidebar-tab active" id="tab-properties" onclick="SC.setTab('properties')">Properties</div>
                <div class="sidebar-tab" id="tab-views" onclick="SC.setTab('views')">Phases</div>
            </div>
            <div id="panel-properties" class="flex-1 overflow-auto custom-scrollbar"></div>
            <div id="panel-views" class="flex-1 overflow-auto hidden custom-scrollbar">
                <div id="view-list"></div>
            </div>
        </div>

        <!-- Main Viewport -->
        <div id="viewport" class="relative flex-1 bg-slate-950 min-w-0">
            <!-- Map Layer -->
            <div id="view-map" class="absolute inset-0 overflow-hidden">
                <svg id="edge-svg" class="absolute inset-0 pointer-events-none"></svg>
                <div id="world-layer" class="z-10 absolute inset-0"></div>
            </div>

            <!-- Render Layer -->
            <div id="view-content" class="absolute inset-0 hidden z-20 bg-slate-900 overflow-auto"></div>

            <!-- Overlays -->
            <div id="linking-overlay" class="hidden absolute top-4 left-1/2 -translate-x-1/2 z-50">
                <div class="bg-sky-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-xl animate-pulse">
                    Select Target to Link</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const Kernel = new MetaMindKernel();
                const Registry = new PhaseRegistrySystem();
                Registry.init(Kernel);
                const Controller = new SandboxController(Kernel, Registry);

                window.Kernel = Kernel;
                window.SC = Controller;

                document.getElementById('btn-undo').onclick = () => Kernel.undo();
                document.getElementById('btn-arrange').onclick = () => Kernel.autoLayout();

                document.getElementById('btn-add').onclick = () => {
                    const vp = Kernel.state.session.viewport;
                    const rect = document.getElementById('viewport').getBoundingClientRect();
                    Kernel.addNode({
                        x: (rect.width / 2 - vp.x) / vp.scale,
                        y: (rect.height / 2 - vp.y) / vp.scale
                    });
                };

                const btnFocal = document.getElementById('btn-focal');
                const updateFocalUI = () => {
                    if (Kernel.config.autoFocus) {
                        btnFocal.className = "shrink-0 px-3 py-1.5 bg-sky-600 text-white text-xs font-bold rounded shadow-lg shadow-sky-900/20 border border-sky-500 transition-all";
                    } else {
                        btnFocal.className = "shrink-0 px-3 py-1.5 bg-slate-800 text-slate-400 text-xs font-bold rounded border border-slate-700 transition-all hover:bg-slate-700";
                    }
                };
                updateFocalUI();
                btnFocal.onclick = () => {
                    Kernel.config.autoFocus = !Kernel.config.autoFocus;
                    updateFocalUI();
                };

                setInterval(async () => {
                    const statusEl = document.getElementById('host-status');
                    if (!statusEl) return;
                    const isConnected = await Kernel.bridge.checkConnection();
                    if (isConnected) {
                        statusEl.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Host Linked';
                        statusEl.classList.add('text-emerald-500');
                    } else {
                        statusEl.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Host Offline';
                        statusEl.classList.remove('text-emerald-500');
                    }
                }, 5000);

            } catch (e) {
                console.error("Initialization Failed:", e);
            }
        });
    </script>
</body>

</html>
