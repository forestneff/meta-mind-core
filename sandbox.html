<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta-Mind Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="meta-mind-ui.css">

    <!-- CRITICAL LOAD ORDER -->
    <script src="meta-mind-library.js"></script>
    <script src="meta-mind-rules.js"></script>
    <script src="meta-mind-core.js"></script>
    <script src="phase-engines.js"></script>
    <script src="meta-mind-sandbox.js"></script>
    <script src="meta-mind-tutorials.js"></script>
    <script src="meta_mind_ai_engine.js"></script>
</head>

<body class="overflow-hidden bg-slate-950 select-none">
    <nav
        class="h-14 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center px-2 md:px-4 z-50 relative backdrop-blur w-full gap-2 md:gap-4">
        <!-- Identity & Status -->
        <div class="flex items-center gap-2 md:gap-3 shrink-0">
            <!-- Universal Hamburger Menu -->
            <button id="btn-sidebar-toggle"
                class="p-1 md:p-1.5 text-slate-400 hover:text-white transition-colors rounded hover:bg-slate-800"
                onclick="SC.toggleSidebar()" title="Toggle Inspector">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>

            <!-- M-M Home Link -->
            <a href="index.html"
                class="w-7 h-7 md:w-8 md:h-8 bg-sky-600 rounded flex items-center justify-center text-white font-black shadow-lg shadow-sky-900/50 text-[10px] md:text-xs no-underline hover:bg-sky-500 transition-colors shrink-0">M-M</a>

            <div class="flex flex-col">
                <!-- Desktop Title -->
                <span id="map-title"
                    class="text-sm font-bold text-slate-200 leading-none hidden sm:block mt-0.5">Meta-Mind</span>
                <!-- Mobile Stacked Title -->
                <div
                    class="flex flex-col sm:hidden text-[9px] font-black text-slate-200 leading-tight uppercase tracking-widest mt-0.5">
                    <span>Meta</span>
                    <span>Mind</span>
                </div>
                <!-- Indicators (Hidden on Mobile) -->
                <div class="hidden sm:flex gap-2 mt-1">
                    <span id="save-status"
                        class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Local
                    </span>
                    <span id="host-status"
                        class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Host Offline
                    </span>
                </div>
            </div>
        </div>

        <!-- Central Search Bar -->
        <div class="flex-1 max-w-md relative z-50">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                    <svg class="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" id="map-search-input" placeholder="Search map nodes..."
                    class="w-full bg-slate-950/60 border border-slate-700 text-slate-200 pl-8 pr-3 py-1.5 md:py-2 rounded-full text-xs md:text-sm outline-none focus:border-sky-500 focus:bg-slate-900 transition-colors placeholder:text-slate-500 shadow-inner">
            </div>
            <div id="map-search-results"
                class="hidden absolute top-full mt-2 left-0 right-0 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl max-h-64 overflow-y-auto custom-scrollbar flex-col gap-1 p-2 backdrop-blur-md">
            </div>
        </div>

        <!-- Responsive Toolbar -->
        <div class="flex items-center relative shrink-0">
            <!-- Mobile Menu Toggle -->
            <button
                id="btn-mobile-tools"
                onclick="const tb = document.getElementById('top-toolbar'); tb.classList.toggle('hidden'); tb.classList.toggle('flex');"
                class="p-2 text-slate-400 hover:text-white transition-colors rounded hover:bg-slate-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z">
                    </path>
                </svg>
            </button>

            <!-- Tools (Dropdown on all screens) -->
            <div id="top-toolbar"
                class="hidden absolute top-12 right-0 w-48 bg-slate-900 border border-slate-700 rounded-xl p-3 flex-col gap-3 shadow-2xl z-50">

                <button id="btn-add"
                    class="w-full px-3 py-2 bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold rounded transition-colors shadow-lg flex items-center justify-center gap-2"
                    title="Add Root Node">
                    ➕ <span>Root</span>
                </button>

                <button id="btn-arrange"
                    class="w-full px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded border border-slate-700 transition-colors flex items-center justify-center gap-2"
                    title="Force-Directed Organic Layout">
                    ✨ <span>Arrange</span>
                </button>

                <button id="btn-undo"
                    class="w-full px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded border border-slate-700 transition-colors flex items-center justify-center gap-2"
                    title="Undo Last Layout Change">
                    ↩️ <span>Undo</span>
                </button>

                <div class="h-6 w-px bg-slate-700 mx-1 shrink-0 hidden"></div>

                <button id="btn-focal"
                    class="w-full px-3 py-2 bg-slate-800 text-slate-400 text-xs font-bold rounded border border-slate-700 transition-all flex items-center justify-center gap-2"
                    title="Toggle Auto-Focus Panning">
                    🎯 <span id="focal-status">Focal</span>
                </button>

                <button id="btn-web-edit"
                    class="hidden w-full md:w-auto px-3 py-2 md:py-1.5 bg-slate-800 text-slate-400 text-xs font-bold rounded border border-slate-700 transition-all flex items-center justify-center md:justify-start gap-2"
                    title="Toggle Web Edit Mode">
                    ✏️ <span>Edit UI</span>
                </button>
            </div>
        </div>
    </nav>

    <div id="stage">
        <!-- New Universal Rail & Slide-out Inspector -->
        <div id="sidebar"
            class="border-r border-slate-800 flex z-40 bg-slate-900/95 backdrop-blur-md shrink-0 transition-all duration-300 overflow-hidden">

            <!-- Narrow Tool Rail (Always visible) -->
            <div id="phase-selection-area"
                class="w-[56px] shrink-0 flex flex-col items-center py-4 gap-2 bg-slate-950 border-r border-slate-800 z-10 shadow-lg h-full">
                <button id="btn-phase-map"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all active flex items-center justify-center"
                    onclick="SC.setView('map')" title="Map Phase">🗺️</button>
                <button id="btn-phase-data"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('data')" title="Data Manager">🗄️</button>
                <button id="btn-phase-orbital"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('orbital')" title="Orbital Focus">🔮</button>
                <button id="btn-phase-web"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('web')" title="Web Architect">🌐</button>

                <div class="w-8 h-px bg-slate-800 my-2"></div>

            </div>

            <!-- Expandable Inspector Panel -->
            <div id="sidebar-content" class="flex flex-col w-[256px] shrink-0 bg-slate-900/90 h-full">
                <div class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                    <span class="font-bold text-xs uppercase tracking-widest text-slate-400">Inspector</span>
                    <button class="p-1 text-slate-400 hover:text-white" onclick="SC.toggleSidebar()"
                        title="Close Inspector">✕</button>
                </div>
                <div id="panel-properties" class="flex-1 overflow-auto custom-scrollbar"></div>
            </div>
        </div>

        <!-- Main Viewport -->
        <div id="viewport" class="relative flex-1 bg-slate-950 min-w-0 transition-all duration-300">
            <!-- Map Layer -->
            <div id="view-map" class="absolute inset-0 overflow-hidden">
                <svg id="edge-svg" class="absolute inset-0 pointer-events-none"></svg>
                <div id="world-layer" class="z-10 absolute inset-0"></div>
            </div>

            <!-- Render Layer -->
            <div id="view-content" class="absolute inset-0 hidden z-20 bg-slate-900 overflow-auto"></div>

            <!-- Overlays -->
            <div id="linking-overlay" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
                <div
                    class="border-2 border-amber-500 bg-slate-900/90 text-amber-500 px-6 py-2 rounded-full text-xs font-black tracking-widest uppercase shadow-[0_0_15px_rgba(245,158,11,0.4)] animate-pulse backdrop-blur">
                    Select Target & Click Link
                </div>
            </div>

            <!-- NEW AI Target Overlay -->
            <div id="ai-overlay" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
                <div
                    class="border-2 border-indigo-500 bg-slate-900/90 text-indigo-400 px-6 py-2 rounded-full text-xs font-black tracking-widest uppercase shadow-[0_0_15px_rgba(79,70,229,0.4)] animate-pulse backdrop-blur">
                    Select Smart-Portal to Inject AI Data
                </div>
            </div>

        </div>
    </div>

    <!-- NEW AI Chat Container Placeholder -->
    <div id="ai-chat-container"></div>
    <!-- Initialization Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const Kernel = new MetaMindKernel();
                const Registry = new PhaseRegistrySystem();
                Registry.init(Kernel);

                if (!Kernel.state.session.selectedId && Kernel.state.nodes.length > 0) {
                    Kernel.selectNode(Kernel.state.nodes[0].id);
                }

                const Controller = new SandboxController(Kernel, Registry);
                window.Kernel = Kernel;
                window.SC = Controller;

                // INITIATE AI ENGINE
                window.AI = new MetaMindAI(Kernel, Controller);

                // INITIATE TUTORIALS
                window.Tutorials = new TutorialOrchestrator(window.AI);

                document.getElementById('btn-undo').onclick = () => { Kernel.undo(); document.getElementById('top-toolbar').classList.add('hidden'); document.getElementById('top-toolbar').classList.remove('flex'); };
                document.getElementById('btn-arrange').onclick = () => { Kernel.autoLayout(); document.getElementById('top-toolbar').classList.add('hidden'); document.getElementById('top-toolbar').classList.remove('flex'); };

                document.getElementById('btn-add').onclick = () => {
                    const vp = Kernel.state.session.viewport;
                    const rect = document.getElementById('viewport').getBoundingClientRect();
                    Kernel.addNode({
                        x: (rect.width / 2 - vp.x) / vp.scale,
                        y: (rect.height / 2 - vp.y) / vp.scale
                    });
                    document.getElementById('top-toolbar').classList.add('hidden'); document.getElementById('top-toolbar').classList.remove('flex');
                };

                const btnFocal = document.getElementById('btn-focal');
                const updateFocalUI = () => {
                    if (Kernel.config.autoFocus) {
                        btnFocal.className = "w-full px-3 py-2 bg-sky-600 text-white text-xs font-bold rounded shadow-lg shadow-sky-900/20 border border-sky-500 transition-all flex items-center justify-center gap-2";
                    } else {
                        btnFocal.className = "w-full px-3 py-2 bg-slate-800 text-slate-400 text-xs font-bold rounded border border-slate-700 transition-all hover:bg-slate-700 flex items-center justify-center gap-2";
                    }
                };
                updateFocalUI();
                btnFocal.onclick = () => {
                    Kernel.config.autoFocus = !Kernel.config.autoFocus;
                    updateFocalUI();
                    document.getElementById('top-toolbar').classList.add('hidden'); document.getElementById('top-toolbar').classList.remove('flex');
                };

            } catch (e) {
                console.error("Initialization Failed:", e);
            }
        });
    </script>
</body>

</html>
