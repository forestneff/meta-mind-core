<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta-Mind | v14.9.3 Mobile Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="meta-mind-ui.css">

    <!-- CRITICAL LOAD ORDER -->
    <script src="meta-mind-library.js"></script>
    <script src="meta-mind-rules.js"></script>
    <script src="meta-mind-core.js"></script>
    <script src="phase-engines.js"></script>
    <script src="meta-mind-sandbox.js"></script>
</head>

<body class="overflow-hidden bg-slate-950 select-none">
    <nav
        class="h-14 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center px-2 md:px-4 z-50 relative backdrop-blur w-full">
        <!-- Identity & Status -->
        <div class="flex items-center gap-2 shrink-0">
            <!-- Universal Hamburger Menu (Toggles the properties panel) -->
            <button id="btn-sidebar-toggle"
                class="p-1.5 text-slate-400 hover:text-white transition-colors rounded hover:bg-slate-800"
                onclick="SC.toggleSidebar()" title="Toggle Inspector">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>

            <div
                class="w-8 h-8 bg-sky-600 rounded items-center justify-center text-white font-black shadow-lg shadow-sky-900/50 hidden sm:flex ml-2">
                M</div>
            <div class="flex flex-col ml-1">
                <span id="map-title" class="text-sm font-bold text-slate-200 leading-none">Meta-Mind v14.9</span>
                <div class="flex gap-2 mt-1">
                    <span id="save-status"
                        class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Local
                    </span>
                    <span id="host-status"
                        class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center gap-1 hidden sm:flex">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Host Offline
                    </span>
                </div>
            </div>
        </div>

        <!-- Responsive Toolbar: Button text vanishes on mobile -->
        <div class="flex gap-2 overflow-x-auto no-scrollbar items-center px-2">
            <div class="h-6 w-px bg-slate-700 mx-1 shrink-0 hidden md:block"></div>

            <button id="btn-add"
                class="shrink-0 px-3 py-1.5 bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold rounded transition-colors shadow-lg flex items-center gap-1"
                title="Add Root Node">
                ➕<span class="hidden sm:inline">Root</span>
            </button>

            <button id="btn-arrange"
                class="shrink-0 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded border border-slate-700 transition-colors flex items-center gap-1"
                title="Force-Directed Organic Layout">
                ✨<span class="hidden sm:inline">Arrange</span>
            </button>

            <button id="btn-undo"
                class="shrink-0 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded border border-slate-700 transition-colors flex items-center gap-1"
                title="Undo Last Action">
                ↩️<span class="hidden sm:inline">Undo</span>
            </button>

            <div class="h-6 w-px bg-slate-700 mx-1 shrink-0"></div>

            <button id="btn-focal"
                class="shrink-0 px-3 py-1.5 bg-slate-800 text-slate-400 text-xs font-bold rounded border border-slate-700 flex items-center gap-1 transition-all"
                title="Toggle Camera Tracking">
                👁️<span class="hidden sm:inline">Focus</span>
            </button>
        </div>
    </nav>

    <div id="stage">
        <!-- New Universal Rail & Slide-out Inspector (JS assigns 'open' dynamically based on screen size) -->
        <div id="sidebar"
            class="border-r border-slate-800 flex z-40 bg-slate-900/95 backdrop-blur-md shrink-0 transition-all duration-300 overflow-hidden">

            <!-- Narrow Tool Rail (Always visible) -->
            <div
                class="w-[56px] shrink-0 flex flex-col items-center py-4 gap-2 bg-slate-950 border-r border-slate-800 z-10 shadow-lg h-full">
                <button id="btn-phase-map"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all active flex items-center justify-center"
                    onclick="SC.setView('map')" title="Map Phase">🗺️</button>
                <button id="btn-phase-data"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('data')" title="Data Manager">🗄️</button>
                <button id="btn-phase-orbital"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('orbital')" title="Orbital Focus">🔮</button>
                <button id="btn-phase-web"
                    class="phase-btn w-12 h-12 rounded-xl hover:bg-slate-800 text-xl transition-all flex items-center justify-center"
                    onclick="SC.setView('web')" title="Web Architect">🌐</button>

                <div class="w-8 h-px bg-slate-800 my-2"></div>

                <!-- Universal Inspector Toggle (Mobile shortcut) -->
                <button
                    class="w-12 h-12 rounded-xl hover:bg-slate-800 text-xl md:hidden flex items-center justify-center"
                    onclick="SC.toggleSidebar()" title="Toggle Properties">📝</button>
            </div>

            <!-- Expandable Inspector Panel (Fixed width, clipped by CSS overflow when closed) -->
            <div id="sidebar-content" class="flex flex-col w-[256px] shrink-0 bg-slate-900/90 h-full">
                <div class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-950/50">
                    <span class="font-bold text-xs uppercase tracking-widest text-slate-400">Inspector</span>
                    <!-- Universal Close Button -->
                    <button class="p-1 text-slate-400 hover:text-white" onclick="SC.toggleSidebar()"
                        title="Close Inspector">✕</button>
                </div>
                <!-- The Phase Engines will render directly into this container -->
                <div id="panel-properties" class="flex-1 overflow-auto custom-scrollbar"></div>
            </div>
        </div>

        <!-- Main Viewport -->
        <div id="viewport" class="relative flex-1 bg-slate-950 min-w-0 transition-all duration-300">
            <!-- Map Layer -->
            <div id="view-map" class="absolute inset-0 overflow-hidden">
                <svg id="edge-svg" class="absolute inset-0 pointer-events-none"></svg>
                <div id="world-layer" class="z-10 absolute inset-0"></div>
            </div>

            <!-- Render Layer -->
            <div id="view-content" class="absolute inset-0 hidden z-20 bg-slate-900 overflow-auto"></div>

            <!-- Overlays -->
            <div id="linking-overlay" class="hidden absolute top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
                <div
                    class="border-2 border-amber-500 bg-slate-900/90 text-amber-500 px-6 py-2 rounded-full text-xs font-black tracking-widest uppercase shadow-[0_0_15px_rgba(245,158,11,0.4)] animate-pulse backdrop-blur">
                    Select Target & Click Link
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const Kernel = new MetaMindKernel();
                const Registry = new PhaseRegistrySystem();
                Registry.init(Kernel);

                // Auto-select Root Node on Boot so the Inspector is never empty!
                if (!Kernel.state.session.selectedId && Kernel.state.nodes.length > 0) {
                    Kernel.selectNode(Kernel.state.nodes[0].id);
                }

                const Controller = new SandboxController(Kernel, Registry);
                window.Kernel = Kernel;
                window.SC = Controller;

                document.getElementById('btn-undo').onclick = () => Kernel.undo();
                document.getElementById('btn-arrange').onclick = () => Kernel.autoLayout();

                document.getElementById('btn-add').onclick = () => {
                    const vp = Kernel.state.session.viewport;
                    const rect = document.getElementById('viewport').getBoundingClientRect();
                    Kernel.addNode({
                        x: (rect.width / 2 - vp.x) / vp.scale,
                        y: (rect.height / 2 - vp.y) / vp.scale
                    });
                };

                const btnFocal = document.getElementById('btn-focal');
                const updateFocalUI = () => {
                    if (Kernel.config.autoFocus) {
                        btnFocal.className = "shrink-0 px-3 py-1.5 bg-sky-600 text-white text-xs font-bold rounded shadow-lg shadow-sky-900/20 border border-sky-500 transition-all flex items-center gap-1";
                    } else {
                        btnFocal.className = "shrink-0 px-3 py-1.5 bg-slate-800 text-slate-400 text-xs font-bold rounded border border-slate-700 transition-all hover:bg-slate-700 flex items-center gap-1";
                    }
                };
                updateFocalUI();
                btnFocal.onclick = () => {
                    Kernel.config.autoFocus = !Kernel.config.autoFocus;
                    updateFocalUI();
                };

            } catch (e) {
                console.error("Initialization Failed:", e);
            }
        });
    </script>
</body>

</html>
